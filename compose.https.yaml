services:
  caddy:
    image: caddy:2-alpine
    container_name: dingtalk-codex-gateway-caddy
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    environment:
      DINGTALK_GATEWAY_DOMAIN: ${DINGTALK_GATEWAY_DOMAIN:?Set DINGTALK_GATEWAY_DOMAIN in deploy/docker-compose.env}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?Set CADDY_ACME_EMAIL in deploy/docker-compose.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
