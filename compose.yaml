services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: dingtalk-codex-gateway:latest
    container_name: dingtalk-codex-gateway
    restart: unless-stopped
    environment:
      DINGTALK_GATEWAY_ENV: ${DINGTALK_GATEWAY_ENV:-production}
      DINGTALK_GATEWAY_HOST: 0.0.0.0
      DINGTALK_GATEWAY_PORT: 8787
      DINGTALK_GATEWAY_REQUIRE_AUTH: "1"
      DINGTALK_GATEWAY_API_TOKEN: ${DINGTALK_GATEWAY_API_TOKEN:?Set DINGTALK_GATEWAY_API_TOKEN in deploy/docker-compose.env}
      DINGTALK_GATEWAY_AGENT_TOKEN: ${DINGTALK_GATEWAY_AGENT_TOKEN:?Set DINGTALK_GATEWAY_AGENT_TOKEN in deploy/docker-compose.env}
      DINGTALK_GATEWAY_DEFAULT_WORKSPACE: ${DINGTALK_GATEWAY_DEFAULT_WORKSPACE:-default}
      DINGTALK_GATEWAY_JOB_DB_PATH: /app/data/jobs.sqlite3
      DINGTALK_GATEWAY_WORKSPACES_CONFIG: /app/config/workspaces.compose.json
      CODEX_CONFIG: /root/.codex/config.toml
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      DINGTALK_CALLBACK_TOKEN: ${DINGTALK_CALLBACK_TOKEN:-}
      DINGTALK_OUTGOING_WEBHOOK: ${DINGTALK_OUTGOING_WEBHOOK:-}
      DINGTALK_OUTGOING_SECRET: ${DINGTALK_OUTGOING_SECRET:-}
    ports:
      - "${DINGTALK_GATEWAY_BIND_IP:-127.0.0.1}:${DINGTALK_GATEWAY_PUBLISHED_PORT:-8787}:8787"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./data:/app/data
      - ${WORKSPACE_HOST_PATH:-./workspace}:/workspace:rw
      - ${CODEX_CONFIG_DIR:-/root/.codex}:/root/.codex:ro
      - ${META_ADS_MCP_CONFIG_DIR:-/root/.config/meta-ads-mcp}:/root/.config/meta-ads-mcp:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
